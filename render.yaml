services:
  - type: web
    name: axis-engineering-os
    env: node
    plan: free
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: axis-engineering-os-db
          property: connectionString
      - key: PGSSL
        value: true
      - key: AXIS_ADMIN_EMAIL
        sync: false
      - key: AXIS_ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: AXIS_WHATSAPP
        sync: false
      - key: AXIS_CONTACT_EMAIL
        sync: false

databases:
  - name: axis-engineering-os-db
    plan: free
