<!doctype html><html lang="pt-BR" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Criar empresa AXIS</title><link rel="stylesheet" href="style.css"></head><body><div class="noise"></div><header class="topbar"><a class="mark" href="index.html"><img src="assets/axis-logo-premium.svg"><span><span data-brand-name>Gestão Engenharia AXIS</span></span></a><button class="theme-toggle">☾</button></header><main class="checkout"><section class="checkout-card"><span class="badge">Crie sua empresa</span><h1>Seu sistema em menos de 1 minuto</h1><p>Cadastre sua empresa e depois escolha Starter, Professional ou Enterprise.</p><form id="createCompany"><input name="companyName" placeholder="Nome da empresa"><input name="adminName" placeholder="Nome do administrador"><input name="email" type="email" placeholder="E-mail"><input name="password" type="password" placeholder="Senha de acesso"><button class="btn primary full">Criar empresa</button></form></section></main><script src="main.js"></script><script>document.getElementById('createCompany').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());await fetch('/api/register-company',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});location.href='pricing.html'};</script></body></html>
