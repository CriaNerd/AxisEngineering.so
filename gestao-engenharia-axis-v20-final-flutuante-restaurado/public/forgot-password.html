<!doctype html><html lang="pt-BR" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recuperar senha AXIS</title><link rel="stylesheet" href="style.css"></head><body><div class="noise"></div><header class="topbar"><a class="mark" href="index.html"><img src="assets/axis-logo-premium.svg"><span><span data-brand-name>Gestão Engenharia AXIS</span></span></a><button class="theme-toggle">☾</button></header><main class="checkout"><section class="checkout-card"><span class="badge">Recuperação de senha</span><h1>Redefina seu acesso</h1><p>Informe o e-mail cadastrado. Se existir no sistema, enviaremos um link seguro para redefinir sua senha.</p><form id="forgotForm"><input name="email" type="email" placeholder="E-mail cadastrado" required><button class="btn primary full">Enviar link de recuperação</button></form><small id="forgotMsg"></small></section></main><script src="main.js"></script><script>document.getElementById('forgotForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());const r=await fetch('/api/auth/request-password-reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();document.getElementById('forgotMsg').textContent=j.message||j.error||'Solicitação enviada.'};</script></body></html>
