<!doctype html><html lang="pt-BR" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nova senha AXIS</title><link rel="stylesheet" href="style.css"></head><body><div class="noise"></div><header class="topbar"><a class="mark" href="index.html"><img src="assets/axis-logo-premium.svg"><span><span data-brand-name>Gestão Engenharia AXIS</span></span></a><button class="theme-toggle">☾</button></header><main class="checkout"><section class="checkout-card"><span class="badge">Nova senha</span><h1>Crie uma nova senha</h1><p>Digite sua nova senha para voltar a acessar sua empresa.</p><form id="resetForm"><input name="password" type="password" placeholder="Nova senha" required minlength="6"><button class="btn primary full">Salvar nova senha</button></form><small id="resetMsg"></small></section></main><script src="main.js"></script><script>const token=new URLSearchParams(location.search).get('token')||'';document.getElementById('resetForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());data.token=token;const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();document.getElementById('resetMsg').textContent=j.message||j.error||'Processado.'};</script></body></html>
