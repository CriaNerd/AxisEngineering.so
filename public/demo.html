<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teste gratuito • Gestão Engenharia AXIS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="appbody">
  <aside class="sidebar">
    <a class="mark side" href="index.html">
      <img src="assets/axis-logo-premium.svg" alt="AXIS">
      <span><span data-brand-name>Gestão Engenharia AXIS</span></span>
    </a>

    <div class="trial-company">
      <small>Ambiente de teste</small>
      <b id="trialCompanyName">Minha Empresa de Engenharia</b>
    </div>

    <nav class="side-nav">
      <button class="active" data-page="dashboard">Dashboard</button>
      <button data-page="crm">CRM</button>
      <button data-page="obras">Obras</button>
      <button data-page="financeiro">Financeiro</button>
      <button data-page="documentos">Documentos</button>
      <button data-page="equipe">Equipe</button>
    </nav>

    <div class="side-cta">
      <b>Teste gratuito</b>
      <p id="trialSideText">Seus dados ficam salvos neste navegador por 7 dias.</p>
      <a href="pricing.html" class="btn primary full">Escolher plano</a>
    </div>
  </aside>

  <main class="workspace">
    <header class="app-top">
      <div>
        <span class="badge" id="trialBadge">Teste gratuito • 7 dias</span>
        <h1 id="pageTitle">Dashboard</h1>
      </div>
      <div class="app-actions">
        <button class="theme-toggle">☾</button>
        <button class="btn ghost" id="editCompanyBtn">Dados da empresa</button>
        <a class="btn primary" href="pricing.html">Assinar</a>
      </div>
    </header>

    <section id="trialNotice" class="trial-notice"></section>
    <section id="appContent"></section>
  </main>

  <div id="trialModal" class="trial-modal hidden">
    <div class="trial-modal-card">
      <button class="trial-close" id="trialClose">×</button>
      <div id="trialModalContent"></div>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="demo.js"></script>
</body>
</html>
